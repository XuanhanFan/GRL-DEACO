# Public reproduction configuration for:
# "Green Industrial Engineering on the Web: Agent-Driven Ant Colony
# Optimization Tuning for Energy-Efficient 3D Pipe Routing" (WWW 2026).
#
# This file contains the public, runnable configuration surface. It does not
# include private GLB assets, industrial layouts, trained checkpoints, or any
# non-public experiment logs.

paper:
  title: "Green Industrial Engineering on the Web: Agent-Driven Ant Colony Optimization Tuning for Energy-Efficient 3D Pipe Routing"
  venue: "WWW 2026"
  doi: "10.1145/3774904.3793013"
  repository: "https://github.com/XuanhanFan/GRL-DEACO"

paths:
  # Override these paths from the CLI or edit them for your local artifact.
  dataset_dir: piping/scenarios_rl_dataset
  glb_directory: static/glb
  output_dir: piping/rl_training

dataset:
  total_scenarios: 100
  train_scenarios: 64
  validation_scenarios: 16
  test_scenarios: 20
  split_policy: "scenario-level stratified split by simple/medium/complex complexity"
  expected_test_connections:
    simple: 38
    medium: 95
    complex: 51

physical_parameters:
  pipe_diameter_m: 0.154
  flow_rate_m3_s: 0.0278
  grid_spacing_m: 0.10
  pipe_carbon_factor_kgco2_m: 5.0
  elbow_carbon_factor_kgco2_each: 2.0
  grid_carbon_intensity_kgco2_kwh: 0.51
  fluid_density_kg_m3: 998.0
  gravity_m_s2: 9.80665
  darcy_friction_factor: null
  pump_efficiency: 0.75
  annual_hours: 8000
  reference_pipe_diameter_m: 0.154
  pipe_carbon_scale_exponent: 2.0

deaco:
  geometry:
    grid_spacing_m: 0.10
    pipe_radius_m: 0.05
    pipe_safe_margin_m: 0.05
    endpoint_extension_m: 0.25
    endpoint_extension_step_m: 0.10
    endpoint_extension_attempts: 10
    fallback_extension_distances_m: [0.40, 0.60]
    sdbb_expand_margin_m: 0.0
    sdbb_max_boxes: 5
    sdbb_slice_method: adaptive
  aco:
    M_ants: 30
    K_iterations: 60
    alpha: 1.0
    beta: 3.0
    rho: 0.1
    Q: 100.0
    tau_0: 0.1
    tau_max0: 10.0
    tau_min0: 0.01
    A_q0: 0.8
    B_q0: 0.1
    delta_gamma: 0.9
    max_steps: 20000
    early_stop_patience: 20
    early_stop_threshold: 0.05
  fitness_weights:
    omega_Length: 1.0
    omega_Bend: 4.0
    omega_Energy: 0.5
    omega_Install: 1.5
    omega_direction_reward: 2.5
    omega_bend_penalty: 2.0
    omega_height_penalty: 1.0
    w_op: 3.0
    w_emb: 2.0
    w_L: 1.0
    w_bend: 1.5
    w_alt: 1.0
    w_clear: 2.0
  green_coefficients:
    lambda_1: 1.0
    lambda_2: 2.0
    lambda_3: 1.5
    lambda_loc: 1.0
    y_ref: 0.0
    reference_energy: 10000.0
  normalization:
    normalization_mode: adaptive
    normalization_guard_band: 0.15
    use_hybrid_normalization: false
  logging:
    verbose: false

ppo:
  use_gnn: true
  use_attention: true
  lr_actor: 0.0003
  lr_critic: 0.001
  gamma: 0.99
  lambda_gae: 0.95
  epsilon_clip: 0.2
  k_epochs: 4
  entropy_coef: 0.01
  min_batch_size: 4

training:
  episodes: 100
  seed: 2026
  export_interval: 0
  debug_export_interval: 0
  use_scheduler: false
  gradient_clip_actor: 0.5
  gradient_clip_critic: 0.3

reward:
  normalizer:
    window_size: 200
    warmup_size: 50
    initial_mean: 500.0
    initial_std: 200.0
    ema_alpha: 0.1
    fallback_std: 50.0
    inf_penalty: -15.0
    output_clip: [-12.0, 0.0]
  task_normalization:
    enabled: true
    log_scale: 2.0
    clip: [-5.0, 5.0]
    distance_bucket: 20
    height_bucket: 10
    history_min_exact: 3
    history_min_neighbor: 5
    history_limit: 100
    baseline_min: 0.3
    baseline_max: 10.0
    baseline_coefficients:
      intercept: 0.5
      distance: 0.003
      height: 0.015
      interaction: 0.002
  component_weights:
    base: 0.35
    length: 0.12
    height: 0.05
    correction: 0.05
    green: 0.05
    diversity: 0.02
    adaptation: 0.20
    utilization: 0.01
    time: 0.15
  component_scales:
    base: 1.0
    length: 1.2
    height: 1.2
    correction: 1.0
    green: 4.0
    diversity: 2.0
    adaptation: 2.0
    utilization: 2.0
    time: 1.0
  component_clips:
    base: [-8.0, 8.0]
    length: [-10.0, 6.0]
    height: [-10.0, 5.0]
    correction: [-8.0, 0.0]
    green: [-20.0, 15.0]
    diversity: [0.0, 5.0]
    adaptation: [0.0, 8.0]
    utilization: [0.0, 3.0]
    time: [-5.0, 1.0]
  path_length:
    max_expected_length_multiplier: 2.0
    reward_scale: 3.0
    clip: [-10.0, 3.0]
  height:
    expected_height_multiplier: 1.5
    penalty_scale: 2.0
    bonus_scale: 0.5
    clip: [-10.0, 2.0]
  green_components:
    energy_coefficient: 2.0
    energy_clip: [-2.0, 2.0]
    carbon_coefficient: 1.5
    carbon_clip: [-1.5, 1.5]
    violation_coefficient: 1.5
    green_clip: [-5.0, 4.0]
  time_efficiency:
    base_seconds: 20.0
    complexity_seconds: 80.0
    reference_iterations: 100.0
    reference_ants: 50.0
    param_factor_clip: [0.3, 5.0]
    timeout_log_clip: [-5.0, 0.0]
    early_bonus_scale: 0.3
    early_bonus_clip: [0.0, 1.0]
  failure:
    partial_base: -20.0
    partial_progress_coefficient: 10.0
    complete: -30.0
    lower_bound: -40.0
    correction_extra_threshold: 0.1
    max_extra_penalty: 10.0
  success_scaling:
    enabled: true
    coefficient: 2.5
    center: 0.5
  adaptive_shaping:
    window_size: 50
    diversity_clip: [0.0, 1.0]
    adaptation_clip: [0.0, 1.0]
    utilization_std_scale: 2.0
    utilization_clip: [0.0, 1.0]
  correction_penalty_coefficient: 5.0

deaco_action_ranges:
  w_emb: [0.1, 5.0]
  w_L: [0.1, 5.0]
  w_bend: [0.1, 6.0]
  w_alt: [0.1, 5.0]
  w_clear: [0.1, 8.0]
  omega_Length: [0.1, 5.0]
  omega_Bend: [0.5, 8.0]
  omega_Energy: [0.0, 3.0]
  omega_Install: [0.0, 5.0]
  omega_direction_reward: [0.0, 5.0]
  omega_bend_penalty: [0.1, 5.0]
  omega_height_penalty: [0.0, 5.0]
  kappa_y: [0.0, 3.0]
  delta_xz: [3.0, 30.0]
  s_sigmoid: [1.0, 10.0]
  alpha: [0.5, 3.0]
  beta: [1.0, 6.0]
  M_ants: [10, 80]
  K_iterations: [20, 120]
  max_steps: [5000, 40000]
  early_stop_patience: [5, 40]
  tau_0: [0.01, 1.0]
  tau_max0: [1.0, 30.0]
  tau_min0: [0.001, 0.1]
  A_q0: [0.1, 0.9]
  B_q0: [0.0, 0.3]
  delta_gamma: [0.5, 0.99]
  rho: [0.02, 0.4]
  Q: [10.0, 300.0]

metrics:
  primary:
    - success_rate
    - path_length_m
    - bend_count
    - altitude_change_m
    - operating_energy_kwh_year
    - embodied_carbon_kgco2
    - operating_carbon_kgco2_year
  baselines:
    - "A*"
    - "GA (no green)"
    - "DEACO (no green)"
    - "DEACO (green)"
    - "GRL-DEACO"
